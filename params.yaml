# ============================================================
# DECISION TREE CONFIGURATION
# ============================================================

decision_tree:

  tuning: false

  params:
    max_depth: null
    min_samples_split: 2
    min_samples_leaf: 1
    criterion: gini

  param_grid:
    max_depth: [6,7,8,9,10,11,12]
    min_samples_split: [2,4,6,8]
    min_samples_leaf: [1,2,3,4]
    criterion: [gini,entropy,log_loss]

  cv: 5


# ============================================================
# RANDOM FOREST CONFIGURATION
# ============================================================

random_forest:

  tuning: true

  baseline_params:
    max_depth: null
    min_samples_split: 2
    min_samples_leaf: 1
    bootstrap: true
    n_jobs: -1


  param_grid:
    criterion: [gini,entropy]
    bootstrap: [true,false]
    max_features: [sqrt,log2,null]

  cv: 5


  final_params:

    n_estimators: 250
    bootstrap: false
    criterion: entropy
    max_features: sqrt

    max_depth: null
    min_samples_split: 2
    min_samples_leaf: 1

    n_jobs: -1


  threshold:

    enabled: true
    value: 0.40

    sweep:
      start: 0.30
      end: 0.60
      step: 0.05


# ============================================================
# FEATURE SELECTION
# ============================================================

feature_selection:

  importance_threshold: 90